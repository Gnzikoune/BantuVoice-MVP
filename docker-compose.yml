version: '3.8'

services:
  backend:
    build: 
      context: .
      dockerfile: Dockerfile.backend
    container_name: bantuvoice-backend
    ports:
      - "8000:8000"
    volumes:
      # Montage de volume pour s'assurer que les données et la DB persistent entre deux redémarrages
      - ./data:/app/data
      - ./.env:/app/.env
    restart: unless-stopped
    environment:
      - PYTHONUNBUFFERED=1

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: bantuvoice-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
